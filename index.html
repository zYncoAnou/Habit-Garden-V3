<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Habit Garden">
<meta name="theme-color" content="#0e2218">
<title>Habit Garden</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0e2218;--card:#162d1e;--border:rgba(82,204,128,.2);--gd:#1b4332;--gm:#2e8055;--gb:#52cc80;--gp:#c2efd4;--acc:#ffd166;--warn:#f07a5a;--text:#eef8f1;--mut:#7abf95;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:Nunito,sans-serif}
body{padding-top:var(--st);padding-bottom:var(--sb);display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse at 20% 90%,rgba(30,92,58,.5) 0%,transparent 50%),radial-gradient(ellipse at 80% 5%,rgba(46,128,85,.25) 0%,transparent 50%),var(--bg)}
button{font-family:inherit;cursor:pointer;border:none;background:transparent;color:inherit}
input,textarea{font-family:inherit}
::-webkit-scrollbar{display:none}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1rem .5rem;border-bottom:1px solid var(--border);flex-shrink:0}
#hdr-title{font-size:1.3rem;font-weight:800;color:var(--gb);cursor:pointer}
#hdr-sub{font-size:.72rem;color:var(--mut);margin-top:.1rem}
.hdr-r{display:flex;align-items:center;gap:.4rem}
#lv-pill{background:rgba(255,209,102,.1);border:1px solid rgba(255,209,102,.3);border-radius:20px;padding:.25rem .65rem;font-size:.75rem;color:var(--acc);font-weight:700;cursor:pointer}
.xp-bar{width:48px;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-top:2px}
#xp-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .5s}
#btn-add{width:32px;height:32px;border-radius:50%;background:var(--gm);color:#fff;font-size:1.2rem;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(46,128,85,.4)}
#btn-add:active{transform:scale(.88)}
#btn-edit{font-size:.7rem;color:var(--mut);padding:.2rem .45rem;border-radius:6px;border:1px solid transparent;transition:all .2s}
#btn-edit.on{color:var(--warn);border-color:rgba(240,122,90,.35)}
.tabs{display:flex;border-top:1px solid var(--border);flex-shrink:0;background:rgba(14,34,24,.96);backdrop-filter:blur(10px);padding-bottom:var(--sb)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.5rem .1rem .35rem;gap:.15rem;color:var(--mut);font-size:.58rem;font-weight:700;letter-spacing:.3px;transition:color .2s;cursor:pointer}
.tab-icon{font-size:1.25rem;transition:transform .2s}
.tab.on{color:var(--gb)}
.tab.on .tab-icon{transform:scale(1.15)}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.page{padding:.9rem 1rem 5rem}
.g-wrap{position:relative;overflow:hidden;flex-shrink:0;height:220px}
.g-bg{position:absolute;inset:0;width:100%;height:100%;display:block;filter:saturate(.45) brightness(.75)}
.g-clock{position:absolute;top:.4rem;right:.7rem;font-size:.6rem;color:rgba(255,255,255,.4);z-index:3;pointer-events:none}
.g-hint{position:absolute;top:.4rem;left:.7rem;font-size:.55rem;color:rgba(255,255,255,.28);z-index:3;pointer-events:none}
.g-layer{position:absolute;inset:0;z-index:2}
.plant-pin{position:absolute;display:flex;flex-direction:column;align-items:center;transform-origin:bottom center;transition:left .3s,bottom .3s}
.p-svg-wrap{filter:drop-shadow(0 5px 10px rgba(0,0,0,.7));transition:filter .3s;cursor:grab;touch-action:none;user-select:none}
.plant-pin.wilted .p-svg-wrap{filter:saturate(.2) brightness(.6)}
.plant-pin.done .p-svg-wrap{filter:drop-shadow(0 5px 10px rgba(0,0,0,.6)) drop-shadow(0 0 12px rgba(82,204,128,.7))}
.p-lbl{font-size:.57rem;font-weight:700;color:#fff;max-width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;background:rgba(0,0,0,.35);border-radius:5px;padding:1px 4px;margin-top:1px;text-shadow:0 1px 3px rgba(0,0,0,.9);cursor:pointer}
.p-stage{font-size:.46rem;color:rgba(255,255,255,.4);text-align:center;text-shadow:0 1px 3px rgba(0,0,0,.9)}
.p-dot{width:6px;height:6px;border-radius:50%;background:var(--gb);box-shadow:0 0 6px rgba(82,204,128,.9);margin-top:1px;opacity:0;transition:opacity .3s}
.plant-pin.done .p-dot{opacity:1}
.add-btn-g{position:absolute;bottom:26px;right:10px;width:32px;height:32px;border-radius:50%;border:2px dashed rgba(255,255,255,.3);color:rgba(255,255,255,.4);font-size:1.2rem;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.2);cursor:pointer;z-index:3}
.h-list{padding:.7rem 1rem}
.h-row{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:.75rem .9rem;margin-bottom:.6rem;display:flex;align-items:center;gap:.7rem;position:relative;overflow:hidden}
.h-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.h-row.done-row::before{background:var(--gb)}
.h-icon{font-size:1.2rem;flex-shrink:0}
.h-info{flex:1;min-width:0}
.h-name{font-size:.9rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.h-id{font-size:.65rem;color:var(--acc);font-style:italic;opacity:.8;margin:.05rem 0 .2rem}
.h-meta{display:flex;align-items:center;gap:.35rem;flex-wrap:wrap}
.h-streak{font-size:.75rem;color:var(--acc);font-weight:700}
.h-tag{font-size:.62rem;background:rgba(255,255,255,.06);border-radius:5px;padding:1px 4px;color:var(--mut)}
.h-bar{flex:1;height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;min-width:30px}
.h-bar-f{height:100%;border-radius:2px;transition:width .5s}
.h-acts{display:flex;flex-direction:column;gap:.25rem;align-items:flex-end;flex-shrink:0}
.done-btn{padding:.32rem .75rem;border-radius:10px;border:1.5px solid var(--gm);background:rgba(46,128,85,.15);color:var(--gb);font-size:.75rem;font-weight:700;transition:all .2s;white-space:nowrap;user-select:none}
.done-btn.on{background:rgba(46,128,85,.4);color:var(--gp);border-color:var(--gb)}
.done-btn:disabled{opacity:.5;cursor:default}
.sos-btn{font-size:.75rem;padding:.2rem .45rem;border-radius:8px;border:1px solid rgba(240,122,90,.35);background:rgba(240,122,90,.08);color:var(--warn)}
.del-btn{position:absolute;top:.4rem;right:.4rem;width:20px;height:20px;border-radius:50%;border:1px solid rgba(240,122,90,.3);background:rgba(240,122,90,.08);color:rgba(240,122,90,.6);font-size:.6rem;display:flex;align-items:center;justify-content:center}
.nm-banner{margin:.5rem .9rem 0;background:rgba(240,122,90,.08);border:1px solid rgba(240,122,90,.28);border-radius:12px;padding:.6rem .85rem;display:flex;gap:.5rem;align-items:center}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:.9rem 1rem;margin-bottom:.8rem}
.card-ttl{font-size:.9rem;font-weight:700;margin-bottom:.7rem}
.sec-ttl{font-size:.95rem;font-weight:800;color:var(--gb);margin-bottom:.8rem;text-align:center}
.wm-ttl{font-size:.95rem;font-weight:800;color:var(--gb);margin-bottom:.8rem;text-align:center}
.lv-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.2rem;margin-bottom:.9rem;text-align:center}
.lv-icon{font-size:2.8rem;margin-bottom:.35rem}
.lv-title{font-size:1.2rem;font-weight:800;color:var(--acc);margin-bottom:.15rem}
.lv-sub{font-size:.75rem;color:var(--mut);margin-bottom:.7rem}
.lv-track{height:8px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden;margin-bottom:.3rem}
.lv-fill{height:100%;background:linear-gradient(90deg,var(--gm),var(--gb));border-radius:4px;transition:width .8s}
.lv-lbs{display:flex;justify-content:space-between;font-size:.68rem;color:var(--mut)}
.bdg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem}
.bdg{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.65rem .35rem;text-align:center}
.bdg.got{border-color:var(--acc);box-shadow:0 0 10px rgba(255,209,102,.12)}
.bdg.locked{opacity:.3;filter:grayscale(1)}
.bdg-icon{font-size:1.55rem;margin-bottom:.2rem}
.bdg-name{font-size:.68rem;font-weight:700;margin-bottom:.08rem}
.bdg-desc{font-size:.58rem;color:var(--mut);line-height:1.3}
.pu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem}
.pu{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.75rem .35rem;text-align:center;position:relative}
.pu.locked{opacity:.35}
.pu.unlocked{border-color:var(--gm)}
.pu-icon{font-size:1.7rem;margin-bottom:.2rem}
.pu-name{font-size:.72rem;font-weight:700;margin-bottom:.08rem}
.pu-req{font-size:.6rem;color:var(--mut)}
.pu-lock{position:absolute;top:.3rem;right:.3rem;font-size:.7rem;opacity:.5}
.sum-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.7rem;margin-bottom:1rem}
.sum-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:.8rem .35rem;text-align:center}
.sum-val{font-size:1.55rem;font-weight:800;color:var(--gb);line-height:1}
.sum-lbl{font-size:.62rem;color:var(--mut);margin-top:.2rem;text-transform:uppercase;letter-spacing:.5px}
.wk-tbl{width:100%;border-collapse:collapse}
.wk-tbl th{font-size:.68rem;color:var(--mut);padding:.35rem .05rem;text-align:center;font-weight:600;border-bottom:1px solid var(--border)}
.wk-tbl th:first-child{text-align:left;padding-left:0}
.wk-tbl td{padding:.4rem .05rem;text-align:center;border-bottom:1px solid rgba(82,204,128,.04)}
.wk-tbl td:first-child{text-align:left;font-size:.75rem;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-left:0}
.wchk{width:26px;height:26px;border-radius:7px;border:1.5px solid rgba(82,204,128,.18);display:inline-flex;align-items:center;justify-content:center;font-size:.72rem;color:transparent;transition:all .2s;cursor:pointer}
.wchk.done{background:var(--gd);border-color:var(--gm);color:var(--gp)}
.wchk.today{border-color:rgba(255,209,102,.5)}
.m-habit{margin-bottom:1.2rem}
.m-lbl{font-size:.82rem;font-weight:600;color:var(--mut);margin-bottom:.3rem}
.m-days{display:flex;gap:2px;flex-wrap:wrap}
.mday-wrap{position:relative;display:inline-flex}
.mday{width:20px;height:20px;border-radius:4px;background:rgba(255,255,255,.04);border:1px solid rgba(82,204,128,.08);font-size:.54rem;color:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative;z-index:1}
.mday.done{background:var(--gd);border-color:var(--gm);color:var(--gp)}
.mday.today{border-color:var(--acc)}
.m-ghost{position:absolute;inset:0;border-radius:4px;border:1px dashed rgba(255,255,255,.2);background:rgba(255,255,255,.05);z-index:0;pointer-events:none}
.m-sum{font-size:.68rem;color:var(--mut);margin-top:.25rem}
.q-row{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:.85rem;margin-bottom:.65rem}
.q-row.done{opacity:.55}
.q-top{display:flex;align-items:center;gap:.6rem;margin-bottom:.45rem}
.q-xp{background:rgba(255,209,102,.1);border:1px solid rgba(255,209,102,.28);border-radius:10px;padding:.18rem .5rem;font-size:.72rem;color:var(--acc);font-weight:700;white-space:nowrap}
.q-bar{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.q-bar-f{height:100%;border-radius:3px;transition:width .6s}
.swatches{display:flex;gap:.45rem;flex-wrap:wrap;margin-top:.5rem}
.swatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s}
.swatch.on{border-color:white;transform:scale(1.15)}
.font-opts{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.5rem}
.font-opt{padding:.35rem .8rem;border-radius:9px;border:1.5px solid var(--border);background:transparent;color:var(--mut);font-size:.78rem;cursor:pointer;transition:all .2s}
.font-opt.on{border-color:var(--gm);color:var(--gb);background:rgba(82,204,128,.08)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:flex-end}
.modal{background:#0d1f10;border:1px solid var(--gm);border-radius:22px 22px 0 0;padding:1.3rem 1.3rem calc(1.3rem + var(--sb));width:100%;max-height:88vh;overflow-y:auto;animation:slideUp .3s cubic-bezier(.34,1.3,.64,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:38px;height:4px;background:rgba(82,204,128,.28);border-radius:2px;margin:0 auto 1rem}
.modal h2{font-size:1.1rem;font-weight:800;color:var(--gb);margin-bottom:.9rem}
.m-label{display:block;font-size:.68rem;letter-spacing:.7px;text-transform:uppercase;color:var(--mut);margin:.8rem 0 .3rem}
.m-inp{width:100%;padding:.7rem .9rem;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-size:.95rem;outline:none;transition:border-color .2s}
.m-inp:focus{border-color:var(--gm)}
.epicker{display:flex;gap:.4rem;flex-wrap:wrap;max-height:110px;overflow-y:auto}
.eopt{font-size:1.35rem;padding:.22rem;border-radius:9px;border:2.5px solid transparent;cursor:pointer;transition:all .15s}
.eopt.on{border-color:var(--gm);background:rgba(82,204,128,.1)}
.pt-scroll{display:flex;gap:.4rem;overflow-x:auto;padding-bottom:.25rem}
.pt-chip{display:flex;flex-direction:column;align-items:center;gap:.18rem;padding:.45rem .55rem;border-radius:10px;border:1.5px solid var(--border);background:transparent;cursor:pointer;transition:all .2s;flex-shrink:0;min-width:52px}
.pt-chip.on{border-color:var(--gm);background:rgba(82,204,128,.08)}
.pt-chip.locked{opacity:.3;cursor:not-allowed}
.pt-chip-icon{font-size:1.2rem}
.pt-chip-name{font-size:.58rem;color:var(--mut);white-space:nowrap}
.pt-chip.on .pt-chip-name{color:var(--gb)}
.freq-opts{display:flex;gap:.35rem;flex-wrap:wrap}
.freq-opt{padding:.3rem .6rem;border-radius:9px;border:1.5px solid var(--border);background:transparent;color:var(--mut);font-size:.72rem;font-weight:600;cursor:pointer;transition:all .2s}
.freq-opt.on{border-color:var(--gm);background:rgba(82,204,128,.08);color:var(--gb)}
.m-acts{display:flex;gap:.65rem;margin-top:1.1rem}
.btn-pri{flex:1;padding:.8rem;border-radius:12px;border:1.5px solid var(--gm);background:var(--gd);color:var(--gp);font-size:.92rem;font-weight:700;transition:all .2s}
.btn-pri:active{background:var(--gm)}
.btn-sec{padding:.8rem 1rem;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--mut)}
.adv-toggle{width:100%;margin-top:.9rem;padding:.45rem;border-radius:9px;border:1px dashed var(--border);background:transparent;color:var(--mut);font-size:.78rem;text-align:left;cursor:pointer}
.mini-opt{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.75rem .9rem;margin-bottom:.5rem;cursor:pointer;transition:all .2s}
.mini-opt:active{border-color:var(--gb)}
.mini-opt-ttl{font-size:.88rem;font-weight:700;margin-bottom:.18rem}
.mini-opt-sub{font-size:.72rem;color:var(--mut)}
.mini-xp{font-size:.68rem;color:var(--acc);font-weight:700;margin-top:.12rem}
.obs-card{background:rgba(255,100,50,.05);border:1px solid rgba(255,100,50,.2);border-radius:12px;padding:.8rem;margin-bottom:.6rem}
.obs-title{font-size:.78rem;font-weight:700;color:var(--warn);margin-bottom:.4rem}
.rpop{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);transition:opacity .3s}
.rpop.closed{opacity:0;pointer-events:none}
.rpop-box{background:#0d1f10;border:1px solid var(--acc);border-radius:22px;padding:1.8rem 1.4rem;text-align:center;max-width:275px;width:90%;animation:popIn .35s cubic-bezier(.34,1.5,.64,1)}
@keyframes popIn{from{transform:scale(.75)}to{transform:scale(1)}}
.rpop-icon{font-size:3.2rem;display:block;margin-bottom:.5rem}
.rpop-title{font-size:1.15rem;font-weight:800;color:var(--acc);margin-bottom:.25rem}
.rpop-text{font-size:.82rem;color:var(--mut);line-height:1.5;margin-bottom:1rem}
.quote-box{background:#0d1f10;border:1px solid var(--gb);border-radius:20px;padding:1.8rem 1.4rem;max-width:290px;width:90%;text-align:center;animation:popIn .35s cubic-bezier(.34,1.5,.64,1)}
.toast{position:fixed;bottom:calc(4.5rem + var(--sb));left:50%;transform:translateX(-50%) translateY(12px);opacity:0;background:var(--gd);color:var(--gp);padding:.55rem 1.1rem;border-radius:26px;font-size:.8rem;font-weight:600;border:1px solid var(--gm);z-index:150;pointer-events:none;box-shadow:0 8px 28px rgba(0,0,0,.5);transition:all .3s;display:flex;align-items:center;gap:.45rem;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:all}
.undo-btn{padding:.18rem .6rem;border-radius:9px;border:1.5px solid var(--gb);background:transparent;color:var(--gb);font-size:.76rem;font-weight:700}
.empty{text-align:center;padding:2rem 1rem;color:var(--mut);font-size:.85rem;line-height:1.7}
.empty-icon{font-size:2.2rem;display:block;margin-bottom:.6rem}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div id="hdr-title">&#127807; Mein Garten &#9998;</div>
    <div id="hdr-sub">Pflanze deine erste Gewohnheit</div>
  </div>
  <div class="hdr-r">
    <div>
      <div id="lv-pill">&#127793; Lv.1</div>
      <div class="xp-bar"><div id="xp-fill" style="width:0%"></div></div>
    </div>
    <button id="btn-edit">Bearb.</button>
    <button id="btn-add">+</button>
  </div>
</div>
<div id="content"></div>
<div class="tabs">
  <div class="tab on" data-tab="garden"><span class="tab-icon">&#127807;</span><span>Garten</span></div>
  <div class="tab" data-tab="quests"><span class="tab-icon">&#127919;</span><span>Quests</span></div>
  <div class="tab" data-tab="rewards"><span class="tab-icon">&#127942;</span><span>Level</span></div>
  <div class="tab" data-tab="calendar"><span class="tab-icon">&#128197;</span><span>Kalender</span></div>
  <div class="tab" data-tab="settings"><span class="tab-icon">&#9881;</span><span>Einstellungen</span></div>
</div>
<div id="modal"></div>
<div id="popup" class="rpop closed"></div>
<div id="quote-pop" class="rpop closed"></div>
<div id="toast" class="toast"></div>
<script>
var SVGS = {
  fern: (s,dt) => {
    const cols = ['#8aaa50','#4ee888','#4ee888','#2dbd6e','#2dbd6e','#2dbd6e','#2dbd6e'];
    const c = cols[s];
    if(s===0) return '<svg width="44" height="68" viewBox="0 0 44 68"><path d="M22 64Q21 52 20 40" stroke="#8aaa50" stroke-width="2" fill="none"/><path d="M20 50Q10 44 8 38Q18 44 20 48" fill="#8aaa50" opacity=".6"/><path d="M20 42Q30 36 31 30Q24 37 20 40" fill="#8aaa50" opacity=".5"/></svg>';
    if(s===1) return '<svg width="44" height="72" viewBox="0 0 44 72"><path d="M22 68Q21 56 20 44" stroke="'+c+'" stroke-width="2.5" fill="none"/><ellipse cx="16" cy="42" rx="8" ry="4.5" fill="'+c+'" transform="rotate(-20 16 42)"/><ellipse cx="27" cy="40" rx="8" ry="4.5" fill="'+c+'" opacity=".8" transform="rotate(15 27 40)"/></svg>';

function fmtD(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function today() { return fmtD(new Date()); }
function randQuote() { return QUOTES[Math.floor(Math.random()*QUOTES.length)]; }
function calcXP(hs) {
  return hs.reduce(function(n,h){
    return n+Object.values(h.done).filter(Boolean).reduce(function(a,v){return a+(typeof v==='number'?v:1);},0);
  },0);
}
function calcStreak(h) {
  var now=new Date(),s=0;
  for(var j=0;j<=365;j++){var d=new Date(now);d.setDate(now.getDate()-j);if(h.done[fmtD(d)])s++;else if(j>0)break;}
  return s;
}
function streakStage(s) { return s===0?0:s<4?1:s<7?2:s<14?3:s<21?4:s<30?5:6; }
function calcHealth(h) {
  var now=new Date(),target=(FREQS.filter(function(f){return f.id===(h.freq||'daily');})[0]||FREQS[0]).days;
  var done7=0;
  for(var i=0;i<7;i++){var d=new Date(now);d.setDate(now.getDate()-i);if(h.done[fmtD(d)])done7++;}
  var s=calcStreak(h);
  return {pct:Math.max(.05,Math.min(1,done7/target)),streak:s,stage:streakStage(s),doneToday:!!h.done[today()]};
}
function hcol(p) { return p<.3?'#f07a5a':p<.6?'#ffd166':'#52cc80'; }
function getLvl(xp) {
  var cur=LEVELS[0],next=LEVELS[1];
  for(var i=LEVELS.length-1;i>=0;i--){if(xp>=LEVELS[i].xp){cur=LEVELS[i];next=LEVELS[i+1]||null;break;}}
  var xi=xp-cur.xp,xt=next?next.xp-cur.xp:1;
  return {cur:cur,next:next,pct:next?Math.min(100,Math.round(xi/xt*100)):100,xi:xi,xt:xt};
}
function weekStart() { var d=new Date(),day=d.getDay()||7,m=new Date(d);m.setDate(d.getDate()-day+1);m.setHours(0,0,0,0);return m; }
function monthStart() { var d=new Date();return new Date(d.getFullYear(),d.getMonth(),1); }
function getWeekDays() {
  var d=new Date(),day=d.getDay()||7,m=new Date(d);m.setDate(d.getDate()-day+1);
  return Array.from({length:7},function(_,i){var x=new Date(m);x.setDate(m.getDate()+i);return x;});
}
function doneInRange(habits,from) {
  var n=0,now=new Date();
  for(var d=new Date(from);d<=now;d.setDate(d.getDate()+1)){
    var k=fmtD(new Date(d));
    habits.forEach(function(h){if(h.done[k])n++;});
  }
  return n;
}
function neverMissAlert(hs) {
  if(!hs.length)return false;
  var now=new Date(),y=new Date(now);y.setDate(now.getDate()-1);
  return hs.some(function(h){return !h.done[fmtD(y)];}) && hs.some(function(h){return !h.done[today()];});
}
function applyTheme() {
  var t=THEMES.filter(function(x){return x.id===S.theme;})[0]||THEMES[0];
  var r=document.documentElement.style;
  r.setProperty('--bg',t.bg);r.setProperty('--gm',t.gm);r.setProperty('--gb',t.gb);r.setProperty('--acc',t.acc);
  document.body.style.fontFamily=(S.fontFamily||'Nunito')+',sans-serif';
}

function setupGardenEvents() {
  var el=document.getElementById('content');
  if(!el)return;

  // Click delegation
  el.addEventListener('click',function(e){
    var t=e.target;
    // Done button
    var doneEl=t.closest('[data-done]');
    if(doneEl&&!t.disabled&&!doneEl.disabled){markDone(doneEl.dataset.done);return;}
    // Del button
    var delEl=t.closest('[data-del]');
    if(delEl){deleteHabit(delEl.dataset.del);return;}
    // SOS button
    var sosEl=t.closest('[data-sos]');
    if(sosEl){openSOS(sosEl.dataset.sos);return;}
    // Add button
    if(t.id==='add-btn-g'||t.closest('#add-btn-g')){openAddHabit();return;}
    // Change plant (click SVG wrap)
    var svgEl=t.closest('.p-svg-wrap');
    if(svgEl){openChangePlant(svgEl.dataset.id);return;}
  });

  // Long press on done buttons
  el.addEventListener('mousedown',function(e){
    var btn=e.target.closest('[data-done]');
    if(btn&&!btn.disabled){_lpTimer=setTimeout(function(){_lpTimer=null;openMiniModal(btn.dataset.done);},650);}
  });
  el.addEventListener('mouseup',function(){clearTimeout(_lpTimer);_lpTimer=null;});
  el.addEventListener('mouseleave',function(){clearTimeout(_lpTimer);_lpTimer=null;});
  el.addEventListener('touchstart',function(e){
    var btn=e.target.closest('[data-done]');
    if(btn&&!btn.disabled){_lpTimer=setTimeout(function(){_lpTimer=null;openMiniModal(btn.dataset.done);},650);}
  },{passive:true});
  el.addEventListener('touchend',function(){clearTimeout(_lpTimer);_lpTimer=null;});

  // Drag plants
  var layer=document.getElementById('g-layer');
  if(!layer)return;
  var drag=null;
  function getXY(e){return e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};}
  layer.addEventListener('mousedown',function(e){
    var svgw=e.target.closest('.p-svg-wrap');
    if(!svgw)return;
    var pin=svgw.closest('.plant-pin');
    drag={id:pin.dataset.id,ox:parseFloat(pin.style.left)||50,ob:parseFloat(pin.style.bottom)||22,el:pin};
    pin.style.opacity='0.8';pin.style.zIndex='10';pin.style.transition='none';
    e.preventDefault();
  },{passive:false});
  layer.addEventListener('touchstart',function(e){
    var svgw=e.target.closest('.p-svg-wrap');
    if(!svgw)return;
    clearTimeout(_lpTimer);_lpTimer=null;
    var pin=svgw.closest('.plant-pin');
    drag={id:pin.dataset.id,ox:parseFloat(pin.style.left)||50,ob:parseFloat(pin.style.bottom)||22,el:pin};
    pin.style.opacity='0.8';pin.style.zIndex='10';pin.style.transition='none';
  },{passive:true});
  function onMove(e){
    if(!drag)return;
    e.preventDefault();
    var r=layer.getBoundingClientRect(),p=getXY(e);
    var xp=Math.max(5,Math.min(95,(p.x-r.left)/r.width*100));
    var bp=Math.max(16,Math.min(r.height*0.75,r.bottom-p.y));
    drag.el.style.left=xp+'%';drag.el.style.bottom=bp+'px';
    drag.cx=xp;drag.cb=bp;
  }
  function onUp(){
    if(!drag)return;
    if(!S.plantPositions)S.plantPositions={};
    S.plantPositions[drag.id]={x:drag.cx||drag.ox,b:drag.cb||drag.ob,sc:1};
    save();drag.el.style.opacity='1';drag.el.style.zIndex='1';drag=null;
  }
  layer.addEventListener('mousemove',onMove,{passive:false});
  layer.addEventListener('touchmove',onMove,{passive:false});
  layer.addEventListener('mouseup',onUp);
  layer.addEventListener('touchend',onUp);
  document.addEventListener('mouseup',onUp);
}

// ── CALENDAR ─────────────────────────────────────────────────────────────────
function renderCalendar(el) {
  var now=new Date(),y=now.getFullYear(),m=now.getMonth(),tod=today();
  var wd=getWeekDays(),days=new Date(y,m+1,0).getDate();
  var lmDate=m===0?new Date(y-1,11,1):new Date(y,m-1,1);
  var lmY=lmDate.getFullYear(),lmM=lmDate.getMonth(),lmDays=new Date(lmY,lmM+1,0).getDate();
  var html='<div class="page">'+
    '<div style="display:flex;gap:.5rem;margin-bottom:1rem">'+
    '<button class="freq-opt'+(calView==='week'?' on':'')+'" onclick="switchCal(\'week\')">Diese Woche</button>'+
    '<button class="freq-opt'+(calView==='month'?' on':'')+'" onclick="switchCal(\'month\')">Dieser Monat</button>'+
    '</div>';
  if(calView==='week'){
    html+='<div class="wm-ttl">'+wd[0].getDate()+'.'+(wd[0].getMonth()+1)+'. &#8211; '+wd[6].getDate()+'.'+(wd[6].getMonth()+1)+'.</div>';
    if(!S.habits.length){html+='<div class="empty"><span class="empty-icon">&#128197;</span>Keine Gewohnheiten</div>';}
    else{
      html+='<div style="overflow-x:auto"><table class="wk-tbl"><thead><tr><th></th>'+
        WEEK_DAYS.map(function(d){return '<th>'+d+'</th>';}).join('')+'</tr></thead><tbody>';
      S.habits.forEach(function(h){
        html+='<tr><td>'+h.emoji+' '+h.name+'</td>';
        wd.forEach(function(d){
          var k=fmtD(d),isT=k===tod,dne=!!h.done[k];
          html+='<td><div class="wchk'+(dne?' done':'')+(isT?' today':'')+'" data-hid="'+h.id+'" data-k="'+k+'" onclick="calClick(this)">'+(dne?'&#10003;':'')+'</div></td>';
        });
        html+='</tr>';
      });
      html+='</tbody></table></div>';
    }
  } else {
    html+='<div class="wm-ttl">'+MONTH_NAMES[m]+' '+y+'</div>'+
      '<div style="font-size:.72rem;color:var(--mut);text-align:center;margin-bottom:.7rem;opacity:.7">&#128123; Gestrichelt = letzter Monat</div>';
    if(!S.habits.length){html+='<div class="empty"><span class="empty-icon">&#128197;</span>Keine Gewohnheiten</div>';}
    S.habits.forEach(function(h){
      var dc=0;
      var dayEls=Array.from({length:days},function(_,ix){
        var d=ix+1;
        var k=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
        if(h.done[k])dc++;
        var gk=lmY+'-'+String(lmM+1).padStart(2,'0')+'-'+String(Math.min(d,lmDays)).padStart(2,'0');
        var ghost=d<=lmDays&&!!h.done[gk]&&!h.done[k];
        return '<div class="mday-wrap">'+
          '<div class="mday'+(h.done[k]?' done':'')+(k===tod?' today':'')+'" data-hid="'+h.id+'" data-k="'+k+'" onclick="calClick(this)">'+d+'</div>'+
          (ghost?'<div class="m-ghost"></div>':'')+
          '</div>';
      }).join('');
      html+='<div class="m-habit"><div class="m-lbl">'+h.emoji+' '+h.name+'</div>'+
        '<div class="m-days">'+dayEls+'</div>'+
        '<div class="m-sum">'+dc+' von '+Math.min(now.getDate(),days)+' Tagen &#10003;</div></div>';
    });
  }
  el.innerHTML=html+'</div>';
}
function switchCal(v){calView=v;renderCalendar(document.getElementById('content'));}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function markDone(id) {
  var h=S.habits.filter(function(x){return x.id===id;})[0];
  if(!h||h.done[today()])return;
  if(h.sizes&&h.sizes.length){openSizePicker(id);return;}
  if(h.counter){openCounter(id);return;}
  h.done[today()]=1;save();render();
  showQuotePopup(randQuote());
  rollSurprise();
  showToast(h.emoji+' '+h.name+' erledigt! +1 XP',function(){delete h.done[today()];save();render();});
  checkQuests();
}
function markDoneWithXP(id,xp,label) {
  var h=S.habits.filter(function(x){return x.id===id;})[0];
  if(!h)return;
  h.done[today()]=xp;save();closeModal();render();
  showToast(h.emoji+' '+label+' +'+xp+' XP');
  showQuotePopup(randQuote());
  rollSurprise();
  checkQuests();
}
function rollSurprise() {
  var r=Math.random();
  var s=r<.04?{i:'&#128142;',t:'Diamant!',x:6}:r<.08?{i:'&#127808;',t:'Glückstag!',x:5}:r<.1?{i:'&#11088;',t:'Sternenstunde!',x:3}:r<.15?{i:'&#9889;',t:'Energie-Boost!',x:2}:null;
  if(s)setTimeout(function(){showPopup(s.i,s.t,'+'+s.x+' Bonus-XP! &#127881;');},900);
}
function checkQuests() {
  if(!S.completedQuests)S.completedQuests=[];
  var ws=weekStart(),ms=monthStart();
  var wk=ws.toISOString().slice(0,10),mk=ms.toISOString().slice(0,7);
  var wDone=doneInRange(S.habits,ws),mDone=doneInRange(S.habits,ms);
  [{id:'wq1_'+wk,ok:wDone>=10,t:'Grüner Daumen'},{id:'wq2_'+wk,ok:wDone>=20,t:'Auf Kurs'},
   {id:'mq1_'+mk,ok:mDone>=50,t:'Fleißig'},{id:'mq2_'+mk,ok:mDone>=100,t:'Meister'}]
  .forEach(function(c){
    if(c.ok&&S.completedQuests.indexOf(c.id)===-1){
      S.completedQuests.push(c.id);
      setTimeout(function(){showPopup('&#127942;','Quest: '+c.t,'Abgeschlossen! &#127881;');},1200);
    }
  });
  save();
}
function deleteHabit(id){S.habits=S.habits.filter(function(h){return h.id!==id;});save();render();}
function toggleDay(id,k){
  var h=S.habits.filter(function(x){return x.id===id;})[0];
  if(!h)return;
  h.done[k]=h.done[k]?false:1;save();
  if(currentTab==='calendar')renderCalendar(document.getElementById('content'));
}

        '<div style="display:flex;gap:.35rem;margin-bottom:.3rem;align-items:center"><span style="width:22px;font-weight:800;color:var(--acc)">M</span><input class="m-inp" id="nh-m-desc" placeholder="z.B. 15 Min" style="flex:2"><input class="m-inp" type="number" id="nh-m-xp" value="2" min="1" max="10" style="width:48px"><span style="font-size:.65rem;color:var(--mut)">XP</span></div>' +
        '<div style="display:flex;gap:.35rem;margin-bottom:.3rem;align-items:center"><span style="width:22px;font-weight:800;color:var(--acc)">L</span><input class="m-inp" id="nh-l-desc" placeholder="z.B. 30 Min" style="flex:2"><input class="m-inp" type="number" id="nh-l-xp" value="3" min="1" max="10" style="width:48px"><span style="font-size:.65rem;color:var(--mut)">XP</span></div>' +
      '</div>' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:.55rem;margin-bottom:.3rem">' +
        '<span style="font-size:.82rem;font-weight:700">&#128290; Z&#228;hler</span>' +
        '<label style="display:flex;align-items:center;gap:.3rem;cursor:pointer">' +
          '<input type="checkbox" id="nh-use-ctr" onchange="nhToggleCtr(this.checked)">'+
          '<span style="font-size:.75rem;color:var(--mut)">Aktiv</span></label></div>' +
      '<div id="nh-ctr-ui" style="display:none;gap:.4rem">' +
        '<input class="m-inp" id="nh-cunit" placeholder="Einheit (z.B. Seiten)" style="flex:2">'+
        '<input class="m-inp" type="number" id="nh-cgoal" placeholder="Tagesziel" style="width:80px"></div>' +
      '<div style="margin-top:.6rem">' +
        '<div style="font-size:.82rem;font-weight:700;margin-bottom:.3rem">&#128314; Hindernis-Planer</div>' +
        '<div style="font-size:.72rem;color:var(--mut);margin-bottom:.4rem">Was machst du, wenn es schwer wird?</div>' +
        '<div id="nh-obs-list">' +
          '<div class="obs-pair" style="margin-bottom:.4rem">' +
            '<input class="m-inp" style="margin-bottom:.28rem" placeholder="Wenn... (z.B. ich m&#252;de bin)" oninput="nhObs(0,0,this.value)">' +
            '<input class="m-inp" placeholder="Dann... (z.B. nur 5 Min Yoga)" oninput="nhObs(0,1,this.value)"></div></div>' +
        '<button onclick="nhAddObs()" style="font-size:.73rem;color:var(--mut);background:transparent;border:1px dashed var(--border);border-radius:7px;padding:.25rem .5rem;cursor:pointer;margin-top:.2rem">+ Weiteres Szenario</button>' +
      '</div>' +
    '</div>' +
    '<div class="m-acts">'+
      '<button class="btn-sec" onclick="closeModal()">Abbrechen</button>'+
      '<button class="btn-pri" onclick="nhSubmit()">Einpflanzen &#127793;</button>'+
    '</div></div></div>';
}
function nhEmoji(el,e){_nh.emoji=e;document.querySelectorAll('.eopt').forEach(function(x){x.classList.remove('on');});el.classList.add('on');}
function nhFreq(el,id){_nh.freq=id;document.querySelectorAll('#nh-freqs .freq-opt').forEach(function(x){x.classList.remove('on');});el.classList.add('on');}
function nhPlant(el,id){_nh.plantType=id;document.querySelectorAll('.pt-chip').forEach(function(x){x.classList.remove('on');});el.classList.add('on');}
function nhToggleAdv(btn){var adv=document.getElementById('nh-adv');var vis=adv.style.display!=='none';adv.style.display=vis?'none':'block';btn.textContent=(vis?'▼':'▲')+' Erweiterte Optionen';}
function nhToggleSizes(on){document.getElementById('nh-sizes-ui').style.display=on?'block':'none';_nh.useSizes=on;}
function nhToggleCtr(on){var ui=document.getElementById('nh-ctr-ui');ui.style.display=on?'flex':'none';_nh.useCounter=on;}
function nhObs(i,field,val){if(!_nh.obstacles[i])_nh.obstacles[i]={trigger:'',plan:''};_nh.obstacles[i][field===0?'trigger':'plan']=val;}
function nhAddObs(){
  var idx=_nh.obstacles.length;_nh.obstacles.push({trigger:'',plan:''});
  var row=document.createElement('div');row.className='obs-pair';row.style.marginBottom='.4rem';
  var r1=document.createElement('input');r1.className='m-inp';r1.style.marginBottom='.28rem';r1.placeholder='Wenn...';
  r1.addEventListener('input',function(){nhObs(idx,0,this.value);});
  var r2=document.createElement('input');r2.className='m-inp';r2.placeholder='Dann...';
  r2.addEventListener('input',function(){nhObs(idx,1,this.value);});
  row.appendChild(r1);row.appendChild(r2);
  document.getElementById('nh-obs-list').appendChild(row);
}
function nhSubmit(){
  var name=(document.getElementById('nh-name')||{value:''}).value.trim();
  var identity=(document.getElementById('nh-identity')||{value:''}).value.trim();
  if(!name)return;
  if(S.habits.length>=8){showToast('Max. 8 Gewohnheiten');closeModal();return;}
  var sizes=[];
  if(_nh.useSizes){
    var sd=document.getElementById('nh-s-desc').value,sx=parseInt(document.getElementById('nh-s-xp').value)||1;
    var md=document.getElementById('nh-m-desc').value,mx=parseInt(document.getElementById('nh-m-xp').value)||2;
    var ld=document.getElementById('nh-l-desc').value,lx=parseInt(document.getElementById('nh-l-xp').value)||3;
    if(sd)sizes.push({label:'S',desc:sd,xp:sx});
    if(md)sizes.push({label:'M',desc:md,xp:mx});
    if(ld)sizes.push({label:'L',desc:ld,xp:lx});
  }
  var counter=null;
  if(_nh.useCounter){
    var unit=(document.getElementById('nh-cunit')||{value:''}).value;
    var goal=parseInt((document.getElementById('nh-cgoal')||{value:''}).value)||1;
    if(unit)counter={unit:unit,goal:goal};
  }
  var obstacles=_nh.obstacles.filter(function(o){return o.trigger&&o.plan;});
  var h={id:Date.now().toString(),name:name,emoji:_nh.emoji,plantType:_nh.plantType,
    freq:_nh.freq,identity:identity,sizes:sizes,obstacles:obstacles,counter:counter,
    createdAt:new Date().toISOString(),done:{}};
  S.habits.push(h);save();closeModal();render();
  showToast(h.emoji+' "'+h.name+'" eingepflanzt!');
}

function openChangePlant(id) {
  var xp=calcXP(S.habits),h=S.habits.filter(function(x){return x.id===id;})[0];
  if(!h)return;
  var grid=PLANT_TYPES.map(function(pt){
    var ok=xp>=pt.xpR,isCur=h.plantType===pt.id;
    return '<div data-hid="'+h.id+'" data-pid="'+pt.id+'" onclick="'+(ok?'cpClick(this)':'')+'"'+
      ' style="padding:.7rem .4rem;border-radius:13px;text-align:center;cursor:'+(ok?'pointer':'not-allowed')+';opacity:'+(ok?1:.35)+';'+
      'border:1.5px solid '+(isCur?'var(--gb)':'var(--border)')+';background:'+(isCur?'rgba(82,204,128,.12)':'transparent')+'">'+
      '<div style="font-size:1.5rem;margin-bottom:.2rem">'+pt.icon+'</div>'+
      '<div style="font-size:.72rem;font-weight:700">'+pt.name+'</div>'+
      '<div style="font-size:.6rem;color:var(--mut)">'+(ok?'&#10003;':'Ab '+pt.xpR+' XP')+'</div></div>';
  }).join('');
  document.getElementById('modal').innerHTML=
    '<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">'+
    '<div class="modal-handle"></div><h2>'+h.emoji+' '+h.name+'</h2>'+
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-top:.5rem">'+grid+'</div>'+
    '<div class="m-acts"><button class="btn-sec" onclick="closeModal()">Schlie&#223;en</button></div>'+
    '</div></div>';
}
function cpClick(el){changePlant(el.dataset.hid,el.dataset.pid);}
function changePlant(id,pt){var h=S.habits.filter(function(x){return x.id===id;})[0];if(h){h.plantType=pt;save();closeModal();render();}}

function openMiniModal(id) {
  var h=S.habits.filter(function(x){return x.id===id;})[0];
  if(!h)return;
  var sos=(h.obstacles&&h.obstacles.length)?
    '<div class="mini-opt" data-sos="'+id+'" onclick="sosFromMini(this)">'+
    '<div class="mini-opt-ttl">&#128314; Notfall-Plan</div>'+
    '<div class="mini-opt-sub">Meinen Plan anzeigen</div></div>':'';
  document.getElementById('modal').innerHTML=
    '<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">'+
    '<div class="modal-handle"></div><h2>Zu schwer gerade?</h2>'+
    '<p style="font-size:.82rem;color:var(--mut);margin-bottom:1rem">Optionen f&#252;r '+h.emoji+' '+h.name+':</p>'+
    '<div class="mini-opt" data-id="'+id+'" onclick="mmDone(this,1,\'Mini\')">'+
      '<div class="mini-opt-ttl">&#9889; Mini-Version</div>'+
      '<div class="mini-opt-sub">Nur 2-5 Minuten</div><div class="mini-xp">+1 XP</div></div>'+
    '<div class="mini-opt" data-id="'+id+'" onclick="mmDone(this,1,\'Halb\')">'+
      '<div class="mini-opt-ttl">&#128170; Halbe Version</div>'+
      '<div class="mini-opt-sub">50% ist besser als 0%</div><div class="mini-xp">+1 XP</div></div>'+
    sos+
    '<div class="mini-opt" style="opacity:.6" onclick="closeModal()">'+
      '<div class="mini-opt-ttl">&#9197; &#220;berspringen</div>'+
      '<div class="mini-opt-sub">Manchmal ist Ruhe okay</div></div>'+
    '<button class="btn-sec" style="width:100%;margin-top:.5rem" onclick="closeModal()">Abbrechen</button>'+
    '</div></div>';
}
function mmDone(el,xp,lbl){markDoneWithXP(el.dataset.id,xp,lbl);}
function sosFromMini(el){var id=el.dataset.sos;closeModal();setTimeout(function(){openSOS(id);},50);}

function openSOS(id) {
  var h=S.habits.filter(function(x){return x.id===id;})[0];
  if(!h||!h.obstacles||!h.obstacles.length)return;
  var obs=h.obstacles.map(function(o){
    return '<div class="obs-card">'+
      '<div class="obs-title">Wenn: '+o.trigger+'</div>'+
      '<div style="font-size:.86rem;line-height:1.5">Dann: <strong>'+o.plan+'</strong></div>'+
      '<button class="btn-pri" style="width:100%;margin-top:.7rem" data-id="'+id+'" onclick="mmDone(this,1,\'Plan\')">Los! +1 XP</button>'+
      '</div>';
  }).join('');
  document.getElementById('modal').innerHTML=
    '<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">'+
    '<div class="modal-handle"></div><h2>Dein Notfall-Plan</h2>'+obs+
    '<button class="btn-sec" style="width:100%;margin-top:.4rem" onclick="closeModal()">Schlie&#223;en</button>'+
    '</div></div>';
}

function openSizePicker(id) {
  var h=S.habits.filter(function(x){return x.id===id;})[0];
  if(!h)return;
  var rows=h.sizes.map(function(s){
    return '<div class="mini-opt" data-id="'+id+'" data-xp="'+s.xp+'" data-lbl="'+s.label+'" onclick="spClick(this)">'+
      '<div style="display:flex;justify-content:space-between;align-items:center">'+
      '<div><div class="mini-opt-ttl">'+s.label+' &#8212; '+s.desc+'</div>'+
      '<div class="mini-xp">+'+s.xp+' XP</div></div>'+
      '<div style="font-size:1.4rem;font-weight:800;color:var(--acc)">'+s.label+'</div></div></div>';
  }).join('');
  document.getElementById('modal').innerHTML=
    '<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">'+
    '<div class="modal-handle"></div><h2>'+h.emoji+' '+h.name+'</h2>'+
    '<p style="font-size:.82rem;color:var(--mut);margin-bottom:.8rem">Welche Version heute?</p>'+
    rows+'<button class="btn-sec" style="width:100%;margin-top:.5rem" onclick="closeModal()">Abbrechen</button>'+
    '</div></div>';
}
function spClick(el){markDoneWithXP(el.dataset.id,parseInt(el.dataset.xp),el.dataset.lbl);}

function openCounter(id) {
  _ctrId=id;
  var h=S.habits.filter(function(x){return x.id===id;})[0];
  if(!h)return;
  document.getElementById('modal').innerHTML=
    '<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">'+
    '<div class="modal-handle"></div><h2>'+h.emoji+' '+h.name+'</h2>'+
    '<p style="font-size:.82rem;color:var(--mut);margin-bottom:.8rem">Wie viel heute?</p>'+
    '<div style="display:flex;align-items:center;gap:.7rem;margin-bottom:1rem">'+
      '<input class="m-inp" type="number" id="ctr-val" placeholder="Ziel: '+h.counter.goal+'" min="0" style="flex:1;font-size:1.2rem;text-align:center">'+
      '<span style="color:var(--mut)">'+h.counter.unit+'</span></div>'+
    '<div class="m-acts">'+
      '<button class="btn-sec" onclick="closeModal()">Abbrechen</button>'+
      '<button class="btn-pri" onclick="ctrSubmit()">Speichern</button>'+
    '</div></div></div>';
}
function ctrSubmit(){
  var h=S.habits.filter(function(x){return x.id===_ctrId;})[0];
  var val=parseInt((document.getElementById('ctr-val')||{value:'0'}).value)||0;
  if(!h||val<=0)return;
  var xp=Math.max(1,Math.round(val/h.counter.goal));
  markDoneWithXP(_ctrId,xp,val+' '+h.counter.unit);
}

function openWeeklyReview() {
  var ws=weekStart(),wDone=doneInRange(S.habits,ws);
  var best=S.habits.reduce(function(b,h){return Math.max(b,calcStreak(h));},0);
  var tod=today();
  var rows=S.habits.map(function(h){
    return '<div style="display:flex;align-items:center;gap:.5rem;padding:.45rem 0;border-bottom:1px solid rgba(82,204,128,.06)">'+
      '<span>'+h.emoji+'</span>'+
      '<div style="flex:1"><div style="font-size:.8rem;font-weight:600">'+h.name+'</div>'+
      (h.identity?'<div style="font-size:.62rem;color:var(--acc);font-style:italic">'+h.identity+'</div>':'')+
      '</div>'+
      '<div style="text-align:right;font-size:.72rem;color:var(--acc);font-weight:700">'+calcStreak(h)+' &#128293;</div></div>';
  }).join('');
  document.getElementById('modal').innerHTML=
    '<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">'+
    '<div class="modal-handle"></div>'+
    '<div style="text-align:center;margin-bottom:1rem"><div style="font-size:1.8rem">&#128203;</div>'+
    '<div style="font-size:1.1rem;font-weight:800;color:var(--gb)">Wochenr&#252;ckblick</div></div>'+
    '<div class="sum-grid" style="margin-bottom:.8rem">'+
      '<div class="sum-box"><div class="sum-val">'+wDone+'</div><div class="sum-lbl">Erledigt</div></div>'+
      '<div class="sum-box"><div class="sum-val">'+best+'&#128293;</div><div class="sum-lbl">Streak</div></div>'+
      '<div class="sum-box"><div class="sum-val">'+S.habits.filter(function(h){return h.done[tod];}).length+'/'+S.habits.length+'</div><div class="sum-lbl">Heute</div></div>'+
    '</div>'+rows+
    '<div style="margin-top:1rem">'+
      '<div style="font-size:.85rem;font-weight:700;margin-bottom:.3rem">Was lief gut diese Woche?</div>'+
      '<textarea class="m-inp" id="wr-q1" placeholder="z.B. Jeden Morgen meditiert..." style="height:60px;resize:none"></textarea>'+
      '<div style="font-size:.85rem;font-weight:700;margin:.6rem 0 .3rem">Vorsatz f&#252;r n&#228;chste Woche?</div>'+
      '<textarea class="m-inp" id="wr-q2" placeholder="z.B. Fr&#252;her schlafen..." style="height:60px;resize:none"></textarea>'+
    '</div>'+
    '<div class="m-acts">'+
      '<button class="btn-sec" onclick="closeModal()">Schlie&#223;en</button>'+
      '<button class="btn-pri" onclick="wrSubmit()">Neue Woche &#127793;</button>'+
    '</div></div></div>';
}
function wrSubmit(){S.lastReview=new Date().toISOString();save();closeModal();showPopup('&#11088;','Gro&#223;artig!','Regelm&#228;&#223;ige Reflexion ist einer der st&#228;rksten Hebel. &#127807;');}
function checkWeeklyReview(){
  if(!S.habits.length)return;
  var isSunday=new Date().getDay()===0;
  if(!isSunday)return;
  if(!S.lastReview||(new Date()-new Date(S.lastReview))/86400000>=6)setTimeout(openWeeklyReview,2000);
}

// ── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',function(){
  applyTheme();
  render();
  checkWeeklyReview();

  document.getElementById('hdr-title').addEventListener('click',function(){
    var n=prompt('Gartenname:',S.gardenName);
    if(n&&n.trim()){S.gardenName=n.trim().slice(0,30);save();renderHeader();}
  });
  document.getElementById('lv-pill').addEventListener('click',function(){currentTab='rewards';render();});
  document.getElementById('btn-add').addEventListener('click',openAddHabit);
  document.getElementById('btn-edit').addEventListener('click',function(){
    editMode=!editMode;
    this.classList.toggle('on',editMode);
    this.textContent=editMode?'Fertig':'Bearb.';
    if(currentTab==='garden')renderGarden(document.getElementById('content'));
  });
  document.querySelectorAll('.tab').forEach(function(tab){
    tab.addEventListener('click',function(){
      currentTab=tab.dataset.tab;editMode=false;
      var eb=document.getElementById('btn-edit');eb.classList.remove('on');eb.textContent='Bearb.';
      render();
    });
  });
  document.getElementById('popup').addEventListener('click',function(e){if(e.target===this)closePopup();});
  document.getElementById('quote-pop').addEventListener('click',function(e){if(e.target===this)closeQuote();});
});

</script>
</body>
